<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Struk/Invoice - ModalReceh Tools</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f11;color:#e4e4e7;min-height:100vh}
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 24px;border-bottom:1px solid #27272a;display:flex;justify-content:space-between;align-items:center}
        .header h1{font-size:1.1rem;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header a{color:#818cf8;text-decoration:none;font-size:0.85rem}
        .container{max-width:900px;margin:0 auto;padding:24px}
        .tabs{display:flex;gap:8px;margin-bottom:24px}
        .tab{padding:10px 20px;border-radius:10px;background:#18181b;border:1px solid #27272a;color:#a1a1aa;cursor:pointer;font-size:0.9rem;transition:0.2s}
        .tab.active{background:#6366f1;color:#fff;border-color:#6366f1}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-group{margin-bottom:16px}
        .form-group.full{grid-column:1/-1}
        label{display:block;font-size:0.85rem;color:#a1a1aa;margin-bottom:6px;font-weight:500}
        input,textarea,select{width:100%;padding:12px;border-radius:10px;border:1px solid #27272a;background:#18181b;color:#e4e4e7;font-size:0.9rem;outline:none;transition:0.2s}
        input:focus,textarea:focus{border-color:#6366f1}
        textarea{resize:vertical;min-height:60px}
        .items-table{width:100%;border-collapse:collapse;margin:16px 0}
        .items-table th{background:#18181b;padding:10px;text-align:left;font-size:0.8rem;color:#a1a1aa;text-transform:uppercase;letter-spacing:1px}
        .items-table td{padding:8px}
        .items-table input{padding:8px}
        .btn{padding:12px 24px;border-radius:10px;border:none;font-weight:600;cursor:pointer;font-size:0.9rem;transition:0.2s;font-family:inherit}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,0.3)}
        .btn-green{background:#22c55e;color:#fff}
        .btn-red{background:#ef4444;color:#fff;padding:8px 12px;font-size:0.8rem}
        .btn-outline{background:transparent;border:1px solid #27272a;color:#a1a1aa}
        .btn-outline:hover{border-color:#6366f1;color:#6366f1}
        .actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
        .preview{background:#fff;color:#000;padding:40px;border-radius:16px;margin-top:24px;display:none}
        .preview h2{text-align:center;font-size:1.3rem;margin-bottom:4px;color:#1a1a2e}
        .preview .store-info{text-align:center;font-size:0.85rem;color:#666;margin-bottom:20px}
        .preview table{width:100%;border-collapse:collapse;margin:16px 0}
        .preview table th{border-bottom:2px solid #333;padding:8px 4px;text-align:left;font-size:0.8rem}
        .preview table td{padding:8px 4px;font-size:0.9rem;border-bottom:1px solid #eee}
        .preview .total-section{margin-top:16px;text-align:right}
        .preview .total-line{display:flex;justify-content:space-between;padding:4px 0;font-size:0.9rem}
        .preview .total-line.grand{font-weight:700;font-size:1.1rem;border-top:2px solid #333;padding-top:8px;margin-top:8px}
        .preview .footer{text-align:center;margin-top:24px;font-size:0.8rem;color:#999}
        .watermark{text-align:center;padding:16px;font-size:0.75rem;color:#6366f1;margin-top:12px}
        @media(max-width:600px){.form-grid{grid-template-columns:1fr}.tabs{flex-wrap:wrap}}
    </style>
</head>
<body>
    <div class="header">
        <h1>Generator Struk/Invoice</h1>
        <a href="../">← Kembali ke Store</a>
    </div>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('struk')">Struk Warung</div>
            <div class="tab" onclick="switchTab('invoice')">Invoice</div>
        </div>

        <div id="formArea">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nama Toko/Warung</label>
                    <input type="text" id="storeName" placeholder="Warung Berkah" value="Warung Berkah">
                </div>
                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="text" id="storePhone" placeholder="0812xxxx">
                </div>
                <div class="form-group full">
                    <label>Alamat Toko</label>
                    <input type="text" id="storeAddr" placeholder="Jl. Contoh No. 123">
                </div>
                <div class="form-group" id="invoiceNumGroup" style="display:none">
                    <label>No. Invoice</label>
                    <input type="text" id="invoiceNum" placeholder="INV-001">
                </div>
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="txDate">
                </div>
                <div class="form-group" id="customerGroup" style="display:none">
                    <label>Nama Pelanggan</label>
                    <input type="text" id="customerName" placeholder="Nama pelanggan">
                </div>
                <div class="form-group">
                    <label>Nama Kasir</label>
                    <input type="text" id="cashierName" placeholder="Kasir 1" value="Kasir 1">
                </div>
            </div>

            <h3 style="margin:24px 0 12px;font-size:1rem">Item Belanja</h3>
            <table class="items-table">
                <thead>
                    <tr>
                        <th>Barang</th>
                        <th style="width:80px">Qty</th>
                        <th style="width:120px">Harga</th>
                        <th style="width:120px">Subtotal</th>
                        <th style="width:50px"></th>
                    </tr>
                </thead>
                <tbody id="itemsBody">
                    <tr>
                        <td><input placeholder="Nama barang"></td>
                        <td><input type="number" value="1" min="1" onchange="calcSubtotal(this)"></td>
                        <td><input type="number" placeholder="0" onchange="calcSubtotal(this)"></td>
                        <td><input readonly style="background:#1a1a2e"></td>
                        <td><button class="btn btn-red" onclick="removeRow(this)">✕</button></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn btn-outline" onclick="addItem()">+ Tambah Item</button>

            <div class="form-grid" style="margin-top:24px">
                <div class="form-group">
                    <label>Uang Diterima</label>
                    <input type="number" id="paidAmount" placeholder="0" oninput="calcChange()">
                </div>
                <div class="form-group">
                    <label>Kembalian</label>
                    <input type="text" id="changeAmount" readonly style="background:#1a1a2e;font-weight:700;color:#22c55e">
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="generatePreview()">👁 Preview Struk</button>
                <button class="btn btn-green" onclick="printReceipt()">🖨 Print</button>
            </div>
        </div>

        <div class="preview" id="receiptPreview"></div>
        <div class="watermark">Dibuat dengan ModalReceh Tools — oxmdlrch.me</div>
    </div>

    <script>
        let currentMode='struk';
        document.getElementById('txDate').value=new Date().toISOString().split('T')[0];

        function switchTab(mode){
            currentMode=mode;
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('invoiceNumGroup').style.display=mode==='invoice'?'block':'none';
            document.getElementById('customerGroup').style.display=mode==='invoice'?'block':'none';
        }

        function addItem(){
            const tbody=document.getElementById('itemsBody');
            const tr=document.createElement('tr');
            tr.innerHTML='<td><input placeholder="Nama barang"></td><td><input type="number" value="1" min="1" onchange="calcSubtotal(this)"></td><td><input type="number" placeholder="0" onchange="calcSubtotal(this)"></td><td><input readonly style="background:#1a1a2e"></td><td><button class="btn btn-red" onclick="removeRow(this)">✕</button></td>';
            tbody.appendChild(tr);
        }

        function removeRow(btn){
            const rows=document.getElementById('itemsBody').querySelectorAll('tr');
            if(rows.length>1)btn.closest('tr').remove();
        }

        function calcSubtotal(el){
            const tr=el.closest('tr');
            const inputs=tr.querySelectorAll('input');
            const qty=parseFloat(inputs[1].value)||0;
            const price=parseFloat(inputs[2].value)||0;
            inputs[3].value=qty*price;
            calcChange();
        }

        function calcChange(){
            let total=0;
            document.getElementById('itemsBody').querySelectorAll('tr').forEach(tr=>{
                const inputs=tr.querySelectorAll('input');
                total+=parseFloat(inputs[3].value)||0;
            });
            const paid=parseFloat(document.getElementById('paidAmount').value)||0;
            document.getElementById('changeAmount').value=paid>=0?'Rp '+formatNum(paid-total):'';
        }

        function formatNum(n){return Math.abs(n).toLocaleString('id-ID')}

        function getItems(){
            const items=[];
            document.getElementById('itemsBody').querySelectorAll('tr').forEach(tr=>{
                const inputs=tr.querySelectorAll('input');
                const name=inputs[0].value;
                const qty=parseFloat(inputs[1].value)||0;
                const price=parseFloat(inputs[2].value)||0;
                const sub=parseFloat(inputs[3].value)||0;
                if(name&&qty>0)items.push({name,qty,price,sub});
            });
            return items;
        }

        function generatePreview(){
            const items=getItems();
            if(!items.length)return alert('Tambahkan minimal 1 item!');
            let total=items.reduce((a,b)=>a+b.sub,0);
            const paid=parseFloat(document.getElementById('paidAmount').value)||0;
            const change=paid-total;
            const isInvoice=currentMode==='invoice';
            const date=new Date(document.getElementById('txDate').value).toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

            let html='<div style="max-width:350px;margin:0 auto">';
            html+='<h2>'+document.getElementById('storeName').value+'</h2>';
            html+='<div class="store-info">'+document.getElementById('storeAddr').value+'<br>'+document.getElementById('storePhone').value+'</div>';
            html+='<hr style="border:none;border-top:2px dashed #ddd;margin:12px 0">';
            if(isInvoice){
                html+='<div style="font-size:0.85rem;margin-bottom:4px"><b>No:</b> '+(document.getElementById('invoiceNum').value||'INV-001')+'</div>';
                html+='<div style="font-size:0.85rem;margin-bottom:4px"><b>Customer:</b> '+(document.getElementById('customerName').value||'-')+'</div>';
            }
            html+='<div style="font-size:0.85rem;margin-bottom:12px"><b>Kasir:</b> '+document.getElementById('cashierName').value+' | '+date+'</div>';
            html+='<table><thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Harga</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>';
            items.forEach(i=>{
                html+='<tr><td>'+i.name+'</td><td style="text-align:center">'+i.qty+'</td><td style="text-align:right">Rp '+formatNum(i.price)+'</td><td style="text-align:right">Rp '+formatNum(i.sub)+'</td></tr>';
            });
            html+='</tbody></table>';
            html+='<div class="total-section">';
            html+='<div class="total-line"><span>Total</span><b>Rp '+formatNum(total)+'</b></div>';
            if(paid>0){
                html+='<div class="total-line"><span>Bayar</span><span>Rp '+formatNum(paid)+'</span></div>';
                html+='<div class="total-line"><span>Kembali</span><span>Rp '+formatNum(change>=0?change:0)+'</span></div>';
            }
            html+='<div class="total-line grand"><span>'+(isInvoice?'TOTAL TAGIHAN':'TOTAL')+'</span><b>Rp '+formatNum(total)+'</b></div>';
            html+='</div>';
            html+='<div class="footer">Terima kasih atas kunjungan Anda! 🙏</div>';
            html+='</div>';

            const preview=document.getElementById('receiptPreview');
            preview.innerHTML=html;
            preview.style.display='block';
            preview.scrollIntoView({behavior:'smooth'});
        }

        function printReceipt(){
            generatePreview();
            const content=document.getElementById('receiptPreview').innerHTML;
            const win=window.open('','','width=400,height=600');
            win.document.write('<html><head><title>Cetak</title><style>body{font-family:monospace;padding:20px;color:#000}table{width:100%;border-collapse:collapse}th,td{padding:4px;text-align:left}th{border-bottom:1px solid #333;font-size:0.8rem}h2{text-align:center;margin-bottom:4px}.store-info{text-align:center;font-size:0.8rem;color:#666;margin-bottom:12px}.total-line{display:flex;justify-content:space-between;padding:2px 0}.total-line.grand{font-weight:700;border-top:1px solid #000;padding-top:6px;margin-top:6px}.footer{text-align:center;margin-top:16px;font-size:0.8rem;color:#666}</style></head><body>'+content+'</body></html>');
            win.document.close();
            win.print();
        }
    </script>
</body>
</html>

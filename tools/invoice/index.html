<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Struk & Invoice — ModalReceh Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0b;--bg2:#111113;--bg3:#18181b;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--orange:#f59e0b;--pink:#ec4899;--red:#ef4444;--border:#27272a;--radius:16px}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
        ::selection{background:var(--accent);color:#fff}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
        .topbar h1{font-size:1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .topbar a{color:var(--text3);text-decoration:none;font-size:0.85rem;transition:0.2s}.topbar a:hover{color:var(--accent2)}

        .container{max-width:960px;margin:0 auto;padding:24px}
        .hero{text-align:center;padding:40px 0 32px}
        .hero-icon{font-size:3rem;margin-bottom:12px}
        .hero h2{font-size:1.8rem;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
        .hero p{color:var(--text2);max-width:500px;margin:0 auto}

        .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:32px}
        .tab{padding:10px 24px;border-radius:100px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:0.9rem;font-weight:500;transition:0.2s;font-family:inherit}
        .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

        .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
        .card-title{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:700;margin-bottom:20px}
        .card-title .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}

        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-group{margin-bottom:0}.form-group.full{grid-column:1/-1}
        label{display:block;font-size:0.8rem;color:var(--text3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
        input,select,textarea{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem;outline:none;transition:0.2s;font-family:inherit}
        input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        input::placeholder{color:var(--text3)}
        textarea{resize:vertical;min-height:80px}

        .items-table{width:100%;border-collapse:separate;border-spacing:0;margin:16px 0 0}
        .items-table th{background:var(--bg);padding:10px 12px;text-align:left;font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;position:sticky;top:60px}
        .items-table th:first-child{border-radius:10px 0 0 10px}.items-table th:last-child{border-radius:0 10px 10px 0}
        .items-table td{padding:6px}
        .items-table input{padding:10px 12px;font-size:0.85rem}
        .items-table input[readonly]{background:var(--bg2);color:var(--green);font-weight:600}

        .btn{padding:12px 24px;border-radius:12px;border:none;font-weight:600;cursor:pointer;font-size:0.9rem;transition:0.2s;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,0.25)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,0.35)}
        .btn-green{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
        .btn-green:hover{transform:translateY(-2px)}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
        .btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
        .btn-red{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);padding:8px 12px;font-size:0.8rem}
        .btn-red:hover{background:rgba(239,68,68,0.2)}
        .btn-sm{padding:8px 16px;font-size:0.8rem}

        .actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}

        .preview-area{margin-top:24px;display:none}
        .preview-card{background:#fff;color:#000;border-radius:16px;padding:40px;max-width:400px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
        .preview-card h2{text-align:center;font-size:1.2rem;margin-bottom:4px}
        .preview-card .store-info{text-align:center;font-size:0.8rem;color:#666;margin-bottom:16px;line-height:1.5}
        .preview-card hr{border:none;border-top:2px dashed #e5e5e5;margin:12px 0}
        .preview-card table{width:100%;border-collapse:collapse;margin:8px 0}
        .preview-card table th{border-bottom:2px solid #333;padding:6px 4px;text-align:left;font-size:0.75rem;color:#666;text-transform:uppercase}
        .preview-card table td{padding:6px 4px;font-size:0.85rem;border-bottom:1px solid #f0f0f0}
        .preview-card .total-section{margin-top:12px}
        .preview-card .total-line{display:flex;justify-content:space-between;padding:3px 0;font-size:0.85rem}
        .preview-card .total-line.grand{font-weight:800;font-size:1.1rem;border-top:2px solid #333;padding-top:8px;margin-top:8px}
        .preview-card .footer{text-align:center;margin-top:20px;font-size:0.75rem;color:#999}
        .preview-card .meta{font-size:0.8rem;color:#666;margin-bottom:4px}

        .watermark{text-align:center;padding:20px;font-size:0.75rem;color:var(--text3);margin-top:20px}
        .watermark a{color:var(--accent2);text-decoration:none}

        .empty-state{text-align:center;padding:40px;color:var(--text3)}
        .empty-state .icon{font-size:2rem;margin-bottom:8px}

        @media(max-width:640px){
            .form-grid{grid-template-columns:1fr}
            .tabs{flex-wrap:wrap}
            .preview-card{padding:24px}
            .container{padding:16px}
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>🧾 Generator Struk & Invoice</h1>
        <a href="../">← Kembali</a>
    </div>

    <div class="container">
        <div class="hero">
            <div class="hero-icon">🧾</div>
            <h2>Bikin Struk & Invoice</h2>
            <p>Profesional dalam hitungan detik. Siap print thermal 58mm/80mm.</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('struk',this)">Struk Warung</button>
            <button class="tab" onclick="switchTab('invoice',this)">Invoice</button>
        </div>

        <div class="card">
            <div class="card-title"><div class="icon" style="background:rgba(99,102,241,0.1);color:var(--accent)">🏪</div> Info Toko</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nama Toko</label>
                    <input type="text" id="storeName" placeholder="Warung Berkah" value="Warung Berkah">
                </div>
                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="text" id="storePhone" placeholder="0812xxxx">
                </div>
                <div class="form-group full">
                    <label>Alamat Toko</label>
                    <input type="text" id="storeAddr" placeholder="Jl. Contoh No. 123, Kota">
                </div>
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="txDate">
                </div>
                <div class="form-group">
                    <label>Nama Kasir</label>
                    <input type="text" id="cashierName" placeholder="Kasir 1" value="Kasir 1">
                </div>
                <div class="form-group" id="invoiceNumGroup" style="display:none">
                    <label>No. Invoice</label>
                    <input type="text" id="invoiceNum" placeholder="INV-001">
                </div>
                <div class="form-group" id="customerGroup" style="display:none">
                    <label>Nama Pelanggan</label>
                    <input type="text" id="customerName" placeholder="Nama pelanggan">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><div class="icon" style="background:rgba(34,197,94,0.1);color:var(--green)">🛒</div> Item Belanja</div>
            <table class="items-table">
                <thead><tr><th>Nama Barang</th><th style="width:70px">Qty</th><th style="width:110px">Harga</th><th style="width:110px">Subtotal</th><th style="width:44px"></th></tr></thead>
                <tbody id="itemsBody">
                    <tr>
                        <td><input placeholder="Nama barang"></td>
                        <td><input type="number" value="1" min="1" oninput="calcRow(this)"></td>
                        <td><input type="number" placeholder="0" oninput="calcRow(this)"></td>
                        <td><input readonly></td>
                        <td><button class="btn btn-red" onclick="removeRow(this)">✕</button></td>
                    </tr>
                </tbody>
            </table>
            <button class="btn btn-outline btn-sm" onclick="addItem()" style="margin-top:12px">+ Tambah Item</button>
        </div>

        <div class="card">
            <div class="card-title"><div class="icon" style="background:rgba(245,158,11,0.1);color:var(--orange)">💰</div> Pembayaran</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Uang Diterima</label>
                    <input type="number" id="paidAmount" placeholder="0" oninput="calcChange()">
                </div>
                <div class="form-group">
                    <label>Kembalian</label>
                    <input type="text" id="changeAmount" readonly style="color:var(--green);font-weight:700">
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="generatePreview()">👁️ Preview</button>
            <button class="btn btn-green" onclick="printReceipt()">🖨️ Print</button>
        </div>

        <div class="preview-area" id="receiptPreview"></div>
        <div class="watermark">Dibuat dengan <a href="../">ModalReceh Tools</a> — oxmdlrch.me</div>
    </div>

    <script>
        let mode='struk';
        document.getElementById('txDate').value=new Date().toISOString().split('T')[0];

        function switchTab(m,el){
            mode=m;
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('invoiceNumGroup').style.display=m==='invoice'?'block':'none';
            document.getElementById('customerGroup').style.display=m==='invoice'?'block':'none';
        }

        function addItem(){
            const tr=document.createElement('tr');
            tr.innerHTML='<td><input placeholder="Nama barang"></td><td><input type="number" value="1" min="1" oninput="calcRow(this)"></td><td><input type="number" placeholder="0" oninput="calcRow(this)"></td><td><input readonly></td><td><button class="btn btn-red" onclick="removeRow(this)">✕</button></td>';
            document.getElementById('itemsBody').appendChild(tr);
        }

        function removeRow(btn){
            const rows=document.getElementById('itemsBody').querySelectorAll('tr');
            if(rows.length>1)btn.closest('tr').remove();
        }

        function calcRow(el){
            const tr=el.closest('tr');
            const inputs=tr.querySelectorAll('input');
            const qty=parseFloat(inputs[1].value)||0;
            const price=parseFloat(inputs[2].value)||0;
            inputs[3].value=qty*price;
            calcChange();
        }

        function fmt(n){return Math.round(Math.abs(n)).toLocaleString('id-ID')}

        function calcChange(){
            let total=0;
            document.getElementById('itemsBody').querySelectorAll('tr').forEach(tr=>{
                total+=parseFloat(tr.querySelectorAll('input')[3].value)||0;
            });
            const paid=parseFloat(document.getElementById('paidAmount').value)||0;
            document.getElementById('changeAmount').value=paid>0?'Rp '+fmt(paid-total):'';
        }

        function getItems(){
            const items=[];
            document.getElementById('itemsBody').querySelectorAll('tr').forEach(tr=>{
                const i=tr.querySelectorAll('input');
                const name=i[0].value,qty=parseFloat(i[1].value)||0,price=parseFloat(i[2].value)||0,sub=parseFloat(i[3].value)||0;
                if(name&&qty>0)items.push({name,qty,price,sub});
            });
            return items;
        }

        function generatePreview(){
            const items=getItems();
            if(!items.length)return alert('Tambahkan minimal 1 item!');
            let total=items.reduce((a,b)=>a+b.sub,0);
            const paid=parseFloat(document.getElementById('paidAmount').value)||0;
            const change=paid-total;
            const isInv=mode==='invoice';
            const date=new Date(document.getElementById('txDate').value).toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

            let h='<div class="preview-card">';
            h+='<h2>'+document.getElementById('storeName').value+'</h2>';
            h+='<div class="store-info">'+document.getElementById('storeAddr').value+'<br>'+document.getElementById('storePhone').value+'</div>';
            h+='<hr>';
            if(isInv){
                h+='<div class="meta"><b>No:</b> '+(document.getElementById('invoiceNum').value||'INV-001')+'</div>';
                h+='<div class="meta"><b>Customer:</b> '+(document.getElementById('customerName').value||'-')+'</div>';
            }
            h+='<div class="meta"><b>Kasir:</b> '+document.getElementById('cashierName').value+' &nbsp;|&nbsp; '+date+'</div>';
            h+='<table><thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Harga</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>';
            items.forEach(i=>{h+='<tr><td>'+i.name+'</td><td style="text-align:center">'+i.qty+'</td><td style="text-align:right">Rp '+fmt(i.price)+'</td><td style="text-align:right">Rp '+fmt(i.sub)+'</td></tr>'});
            h+='</tbody></table>';
            h+='<div class="total-section">';
            h+='<div class="total-line"><span>Total</span><b>Rp '+fmt(total)+'</b></div>';
            if(paid>0){h+='<div class="total-line"><span>Bayar</span><span>Rp '+fmt(paid)+'</span></div>';h+='<div class="total-line"><span>Kembali</span><span>Rp '+fmt(change>=0?change:0)+'</span></div>'}
            h+='<div class="total-line grand"><span>'+(isInv?'TOTAL TAGIHAN':'TOTAL')+'</span><b>Rp '+fmt(total)+'</b></div>';
            h+='</div>';
            h+='<div class="footer">Terima kasih atas kunjungan Anda! 🙏</div>';
            h+='</div>';

            const el=document.getElementById('receiptPreview');
            el.innerHTML=h;
            el.style.display='block';
            el.scrollIntoView({behavior:'smooth'});
        }

        function printReceipt(){
            generatePreview();
            const content=document.getElementById('receiptPreview').innerHTML;
            const win=window.open('','','width=400,height=600');
            win.document.write('<html><head><title>Cetak</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,sans-serif;padding:20px;color:#000;background:#fff}.preview-card{max-width:100%}h2{text-align:center;font-size:1.2rem;margin-bottom:4px}.store-info{text-align:center;font-size:0.8rem;color:#666;margin-bottom:16px}hr{border:none;border-top:2px dashed #e5e5e5;margin:12px 0}table{width:100%;border-collapse:collapse}th{border-bottom:2px solid #333;padding:6px 4px;text-align:left;font-size:0.75rem;color:#666}td{padding:6px 4px;font-size:0.85rem;border-bottom:1px solid #f0f0f0}.total-section{margin-top:12px}.total-line{display:flex;justify-content:space-between;padding:3px 0;font-size:0.85rem}.total-line.grand{font-weight:800;font-size:1.1rem;border-top:2px solid #333;padding-top:8px;margin-top:8px}.footer{text-align:center;margin-top:20px;font-size:0.75rem;color:#999}.meta{font-size:0.8rem;color:#666;margin-bottom:4px}</style></head><body>'+content+'</body></html>');
            win.document.close();
            win.print();
        }
    </script>
</body>
</html>
